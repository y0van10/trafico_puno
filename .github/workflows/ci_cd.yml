name: CI/CD Pipeline - PunoTraffic AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install linter
        run: pip install flake8==7.0.0
        
      - name: Run flake8
        run: |
          flake8 backend/app/ --max-line-length=120 --count --show-source --statistics
          flake8 ml_pipeline/ --max-line-length=120 --count --show-source --statistics --exclude=__pycache__

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt
          
      - name: Train model for tests
        run: |
          pip install -r ml_pipeline/requirements.txt
          python ml_pipeline/train.py
          
      - name: Run Pytest
        run: |
          cd backend
          PYTHONPATH=./app pytest tests/ -v --tb=short
          
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Backend Image
        run: docker build -t punotraffic-backend:latest ./backend
          
      - name: Build Frontend Image
        run: docker build -t punotraffic-frontend:latest ./frontend